<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern YouTube Hub</title>
    <style>
        /* CSS Variables for easy theme management */
        :root {
            --bg-main: #0f0f0f;
            --bg-card: #212121;
            --bg-input: #121212;
            --bg-hover: #3d3d3d;
            --accent: #3ea6ff;
            --accent-hover: #65b8ff;
            --danger: #ff4e45;
            --danger-hover: #ff746d;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border: #3d3d3d;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem 0; /* Added padding for scrolling */
        }

        .dashboard {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            margin-top: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .section {
            margin-bottom: 1.5rem;
        }

        .status-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        input {
            flex: 1;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            padding: 0.8rem 1.2rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-main);
        }

        .btn-primary:hover { background: var(--accent-hover); }

        .link-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        .link-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            text-align: left;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 12px;
            font-size: 1rem;
        }

        .link-btn:hover {
            background: var(--bg-hover);
            transform: translateY(-2px);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 1.5rem 0;
        }
        
        /* New Styles for Multiple Handles */
        .handle-card {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .handle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .handle-title {
            color: var(--accent);
            font-weight: bold;
            font-size: 1.1rem;
        }

        .btn-remove {
            background: transparent;
            color: var(--danger);
            padding: 0.4rem 0.6rem;
            border: 1px solid var(--danger);
            font-size: 0.8rem;
        }

        .btn-remove:hover {
            background: var(--danger);
            color: white;
        }

        .link-grid-half {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .link-grid-half .link-btn {
            padding: 0.75rem;
            font-size: 0.9rem;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>📺 YouTube Hub</h1>

        <div class="link-grid section">
            <button class="link-btn" onclick="openLink('https://www.youtube.com')">🏠 Home</button>
            <button class="link-btn" onclick="openLink('https://www.youtube.com/feed/trending')">🔥 Trending</button>
            <button class="link-btn" onclick="openLink('https://www.youtube.com/feed/subscriptions')">📚 Subscriptions</button>
        </div>

        <div class="divider"></div>

        <div id="setup-section" class="section">
            <div class="status-text">Add a channel handle to your list</div>
            <div class="input-group">
                <input type="text" id="handle-input" placeholder="@yourhandle">
                <button id="save-btn" class="btn-primary">Add</button>
            </div>
        </div>

        <div id="handles-container">
            </div>
    </div>

    <script>
        // DOM Elements
        const handleInput = document.getElementById('handle-input');
        const saveBtn = document.getElementById('save-btn');
        const handlesContainer = document.getElementById('handles-container');

        // State Array
        let savedHandles = [];

        // Initialize App
        function init() {
            const storedData = localStorage.getItem('yt_handles_list');
            if (storedData) {
                savedHandles = JSON.parse(storedData);
            }
            renderHandles();
        }

        // Helper to open links in a new tab
        function openLink(url) {
            window.open(url, '_blank');
        }

        // Save to LocalStorage
        function saveToStorage() {
            localStorage.setItem('yt_handles_list', JSON.stringify(savedHandles));
        }

        // Remove a specific handle
        function removeHandle(handleToRemove) {
            savedHandles = savedHandles.filter(h => h !== handleToRemove);
            saveToStorage();
            renderHandles();
        }

        // Render the UI for all saved handles
        function renderHandles() {
            handlesContainer.innerHTML = ''; // Clear current list

            if (savedHandles.length === 0) {
                handlesContainer.innerHTML = '<div class="status-text">No channels added yet.</div>';
                return;
            }

            savedHandles.forEach(handle => {
                // Create Card Container
                const card = document.createElement('div');
                card.className = 'handle-card';

                // Create Header
                const header = document.createElement('div');
                header.className = 'handle-header';
                
                const title = document.createElement('div');
                title.className = 'handle-title';
                title.textContent = handle;

                const removeBtn = document.createElement('button');
                removeBtn.className = 'btn-remove';
                removeBtn.textContent = 'Remove';
                removeBtn.onclick = () => removeHandle(handle);

                header.appendChild(title);
                header.appendChild(removeBtn);

                // Create Button Grid
                const grid = document.createElement('div');
                grid.className = 'link-grid-half';

                const btnChannel = document.createElement('button');
                btnChannel.className = 'link-btn';
                btnChannel.textContent = '👤 Channel';
                btnChannel.onclick = () => openLink(`https://www.youtube.com/${handle}`);

                const btnVideos = document.createElement('button');
                btnVideos.className = 'link-btn';
                btnVideos.textContent = '▶️ Videos';
                btnVideos.onclick = () => openLink(`https://www.youtube.com/${handle}/videos`);

                grid.appendChild(btnChannel);
                grid.appendChild(btnVideos);

                // Assemble Card
                card.appendChild(header);
                card.appendChild(grid);

                // Add to DOM
                handlesContainer.appendChild(card);
            });
        }

        // Add a new handle
        saveBtn.addEventListener('click', () => {
            let handle = handleInput.value.trim();
            if (handle) {
                // Auto-prepend '@' if the user forgets it
                if (!handle.startsWith('@')) {
                    handle = '@' + handle;
                }
                
                // Prevent exact duplicates
                if (!savedHandles.includes(handle)) {
                    savedHandles.push(handle);
                    saveToStorage();
                    renderHandles();
                } else {
                    alert('This handle is already in your list!');
                }
                
                handleInput.value = ''; // Clear input field
            } else {
                alert('Please enter a valid handle.');
            }
        });

        // Allow pressing Enter to save
        handleInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                saveBtn.click();
            }
        });

        // Run initialization on load
        init();
    </script>

</body>
</html>
